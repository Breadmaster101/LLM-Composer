<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Money LLM Composer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;      /* Pure white for primary inputs */
            --text-body: #e5e5e5;      /* Bright gray for readable text areas */
            --text-muted: #a3a3a3;     /* Light gray for placeholders and labels */
            --border-dim: #3f3f46;     /* Visible gray for borders/dividers */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden; 
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .pane {
            flex: 1;
            padding: 4vw;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-dim);
            transition: background 0.3s;
        }

        .pane:last-child {
            border-right: none;
        }

        .pane:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .step-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-weight: 500;
        }

        input[type="text"], textarea {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 300;
            outline: none;
            width: 100%;
            resize: none;
            line-height: 1.3;
        }

        input[type="text"] {
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        textarea {
            flex-grow: 1;
            font-size: 1.25rem;
            color: var(--text-body);
            margin-bottom: 2rem;
        }

        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: var(--border-dim); }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-top: auto;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        button {
            background: transparent;
            color: var(--text-main);
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.2s;
        }

        button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 1px;
            background: var(--text-main);
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        button:hover::after { width: 100%; }
        button:active { color: var(--text-muted); }
        
        button:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }
        button:disabled::after { display: none; }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            width: 300px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 1px;
            background: var(--border-dim);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: var(--text-main);
            margin-top: -5.5px;
            transition: transform 0.1s;
        }

        input[type="range"]:hover::-webkit-slider-thumb {
            transform: scale(1.3);
        }

        @media (max-width: 900px) {
            body { overflow: auto; }
            .container { flex-direction: column; height: auto; min-height: 100vh; }
            .pane { height: 100vh; border-right: none; border-bottom: 1px solid var(--border-dim); }
            .pane:last-child { border-bottom: none; }
            input[type="text"] { font-size: 1.5rem; }
            textarea { font-size: 1.1rem; }
            .slider-container { margin-left: 0; width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Left Pane: Prompt Generation -->
    <div class="pane">
        <div class="step-label">Prompt (Paste into LLM)</div>
        
        <input type="text" id="topicInput" placeholder="Describe your song..." oninput="generatePrompt()">
        
        <textarea id="promptOutput" readonly></textarea>
        
        <div class="controls">
            <button onclick="copyPrompt()" id="copyBtn">Copy Prompt</button>
        </div>
    </div>

    <!-- Right Pane: Playback -->
    <div class="pane">
        <div class="step-label">Piano Playback</div>
        
        <textarea id="llmOutput" placeholder="Paste LLM output here&#10;&#10;e.g., C4:1 C4+E4+G4:2 R:1 C5:4"></textarea>
        
        <div class="controls">
            <button onclick="playMusic()" id="playBtn">Play</button>
            <button onclick="stopMusic()" id="stopBtn" disabled>Stop</button>
            
            <div class="slider-container">
                Bpm <span id="bpmValue">120</span>
                <input type="range" id="bpmSlider" min="40" max="240" value="120" oninput="document.getElementById('bpmValue').innerText = this.value">
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { SplendidGrandPiano, Reverb } from "https://unpkg.com/smplr/dist/index.mjs";

    window.generatePrompt = function() {
        const topic = document.getElementById('topicInput').value || 'A Hanz Zimmer-esque main theme for a sci-fi movie. An overall very iconic, memorable, emotional, unique, and moving song.';
        const prompt = `Act as an expert composer. Write a polyphonic solo piano piece (melody and chords together) for the following theme: "${topic}"\n\nOutput ONLY the sequence of notes using this exact format: Notes:Beats\n- Notes: Note name and octave (e.g., C4, D#4). To play multiple notes at the exact same time (chords/polyphony), join them with a plus sign (e.g., C4+E4+G4).\n- Beats: Duration in beats (0.5 = eighth note, 1 = quarter note, 2 = half note, etc.).\n- Rests: Use "R" for rests (e.g., R:1).\n- Separate each block with a single space.\n\nExample Output:\nC4:1 C4+E4+G4:2 R:0.5 C5+E5:1.5 C4+G4+C5+Eb5:4\n\nProvide ONLY the raw text sequence. Do not include introductory text, explanations, or markdown code blocks. The BPM used is 120.`;
        
        document.getElementById('promptOutput').value = prompt;
    };

    window.copyPrompt = function() {
        const promptArea = document.getElementById('promptOutput');
        promptArea.select();
        navigator.clipboard.writeText(promptArea.value).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = 'Copied';
            setTimeout(() => btn.innerText = 'Copy Prompt', 2000);
        });
    };

    window.generatePrompt();

    let audioCtx = null;
    let piano = null;
    let stopTimeout = null;

    window.playMusic = async function() {
        const rawText = document.getElementById('llmOutput').value;
        const regex = /([a-zA-Z0-9#b+]+):(\d+(\.\d+)?)/g;
        const matches = [...rawText.matchAll(regex)];

        if (matches.length === 0) {
            alert("No valid notes found.");
            return;
        }

        window.stopMusic();

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        piano = new SplendidGrandPiano(audioCtx);

        piano.output.addEffect("reverb", new Reverb(audioCtx), 0.25);

        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');

        playBtn.disabled = true;
        playBtn.innerText = "Loading...";

        await piano.load;

        if (!audioCtx || audioCtx.state === 'closed') return;

        playBtn.innerText = "Playing...";
        stopBtn.disabled = false;

        let currentNoteIndex = 0;
        let nextNoteTime = audioCtx.currentTime + 0.1;

        // Dynamic look-ahead scheduler for real-time tempo changes
        function schedule() {
            if (!audioCtx || audioCtx.state === 'closed') return;

            // Schedule notes within the next 200ms window
            while (currentNoteIndex < matches.length && nextNoteTime < audioCtx.currentTime + 0.2) {
                const match = matches[currentNoteIndex];
                const noteBlock = match[1];
                const durationBeats = parseFloat(match[2]);

                // Read current BPM directly from the slider dynamically
                const bpm = parseInt(document.getElementById('bpmSlider').value) || 120;
                const beatDurationSecs = 60 / bpm;
                const durationSecs = durationBeats * beatDurationSecs;

                if (!noteBlock.toUpperCase().startsWith('R')) {
                    const notes = noteBlock.split('+');
                    
                    notes.forEach(noteStr => {
                        const formattedNote = noteStr.charAt(0).toUpperCase() + noteStr.slice(1).toLowerCase();
                        const velocity = Math.floor(70 + Math.random() * 35);

                        try {
                            piano.start({
                                note: formattedNote,
                                time: nextNoteTime,
                                duration: durationSecs,
                                velocity: velocity
                            });
                        } catch(e) {
                            console.warn("Skipped unparseable note:", formattedNote);
                        }
                    });
                }
                
                nextNoteTime += durationSecs;
                currentNoteIndex++;
            }

            if (currentNoteIndex < matches.length) {
                // Keep polling every 25ms
                stopTimeout = setTimeout(schedule, 25);
            } else {
                // Final timeout when sequence is finished scheduling
                const totalDurationMs = (nextNoteTime - audioCtx.currentTime) * 1000 + 3000;
                stopTimeout = setTimeout(() => {
                    window.stopMusic();
                }, Math.max(totalDurationMs, 0));
            }
        }

        // Start the scheduler
        schedule();
    };

    window.stopMusic = function() {
        if (audioCtx) {
            audioCtx.close(); 
            audioCtx = null;
        }
        piano = null;
        
        if (stopTimeout) {
            clearTimeout(stopTimeout);
            stopTimeout = null;
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.disabled = false;
        playBtn.innerText = "Play";
        document.getElementById('stopBtn').disabled = true;
    };
</script>

</body>
</html>
