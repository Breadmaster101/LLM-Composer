<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Money LLM Composer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-body: #e5e5e5;
            --text-muted: #a3a3a3;
            --border-dim: #3f3f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden; 
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .pane {
            flex: 1;
            padding: 4vw;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-dim);
            transition: background 0.3s;
        }

        .pane:last-child {
            border-right: none;
        }

        .pane:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .step-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-weight: 500;
        }

        input[type="text"], .input-area, textarea {
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
            width: 100%;
            line-height: 1.4;
            font-weight: 300;
        }

        input[type="text"] {
            font-size: 2rem;
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        .input-area {
            flex-grow: 1;
            font-size: 1.25rem;
            color: var(--text-body);
            margin-bottom: 2rem;
            overflow-y: auto;
            white-space: pre-wrap; 
            word-break: break-word;
        }

        .input-area[placeholder]:empty:before {
            content: attr(placeholder);
            color: var(--text-muted);
            cursor: text;
        }

        .input-area::-webkit-scrollbar { width: 4px; }
        .input-area::-webkit-scrollbar-track { background: transparent; }
        .input-area::-webkit-scrollbar-thumb { background: var(--border-dim); }

        .active-note {
            font-weight: 700;
            color: #fff;
            transition: all 0.1s;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-top: auto;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        button {
            background: transparent;
            color: var(--text-main);
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.2s;
        }

        button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 1px;
            background: var(--text-main);
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        button:hover::after { width: 100%; }
        button:active { color: var(--text-muted); }
        
        button:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }
        button:disabled::after { display: none; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .btn-playing {
            animation: pulse 2s infinite ease-in-out;
            cursor: default;
        }

        textarea#promptOutput {
            background: transparent;
            border: none;
            color: var(--text-body);
            font-size: 1.25rem;
            outline: none;
            width: 100%;
            resize: none;
            flex-grow: 1;
            margin-bottom: 2rem;
            font-weight: 300;
        }
        
        textarea#promptOutput::-webkit-scrollbar { width: 4px; }
        textarea#promptOutput::-webkit-scrollbar-track { background: transparent; }
        textarea#promptOutput::-webkit-scrollbar-thumb { background: var(--border-dim); }

        @media (max-width: 900px) {
            body { overflow: auto; }
            .container { flex-direction: column; height: auto; min-height: 100vh; }
            .pane { height: 100vh; border-right: none; border-bottom: 1px solid var(--border-dim); }
            .pane:last-child { border-bottom: none; }
            input[type="text"] { font-size: 1.5rem; }
            .input-area { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="pane">
        <div class="step-label">Prompt (Paste into LLM)</div>
        
        <input type="text" id="topicInput" placeholder="Describe your song here..." oninput="generatePrompt()">
        
        <textarea id="promptOutput" readonly></textarea>
        
        <div class="controls">
            <button onclick="copyPrompt()" id="copyBtn">Copy Prompt</button>
        </div>
    </div>

    <div class="pane">
        <div class="step-label">Piano Playback</div>
        
        <div id="llmOutput" class="input-area" contenteditable="true" placeholder="Paste LLM output here&#10;&#10;e.g., [T:50] [D:p] [Ped:On] R(E4:0.25 F#4:0.25) L(E1+B1+E2:0.5) |"></div>
        
        <div class="controls">
            <button onclick="playMusic()" id="playBtn">Play</button>
            <button onclick="stopMusic()" id="stopBtn" disabled>Stop</button>
        </div>
    </div>
</div>

<script type="module">
    import { SplendidGrandPiano, Reverb } from "https://unpkg.com/smplr/dist/index.mjs";

    const llmOutput = document.getElementById('llmOutput');

    llmOutput.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        document.execCommand('insertText', false, text);
    });

    llmOutput.addEventListener('input', function() {
        if (this.innerText.trim() === '') {
            this.innerHTML = '';
        }
    });

    window.generatePrompt = function() {
        const topic = document.getElementById('topicInput').value || 'A Hanz Zimmer-esque main theme for a sci-fi movie. An overall very iconic, memorable, emotional, unique, and moving song.';
        const prompt = `Act as an expert composer. Write a complex piano piece for the following prompt: "${topic}"

Output ONLY the sequence of notes using this format to capture nuances:
1. Voices (Polyphony): Use R(...) and L(...) or V1(...)/V2(...) to allow independent rhythms simultaneously.
2. Notes:Beats: e.g. E4:0.25. Use plus for chords (C4+E4+G4:2). Rests are R:1.
3. Tempo Changes: Use [T:BPM] (e.g. [T:50], [T:65]).
4. Dynamics: Use [D:p], [D:mp], [D:f], etc. to control volume gracefully.
5. Sustain Pedal: Use [Ped:On] and [Ped:Off] to link beautiful ambient chords.
6. Measure Markers: Use | to separate measures and synchronize R and L voices.

Example Output:
[T:50] [D:p] [Ped:On] R(E4:0.25 F#4:0.25 E4:0.25 B4:0.25) L(E1+B1+E2:1) | [T:65] [D:f] R(G5:1) L(C3:1) [Ped:Off]

Provide ONLY the raw text sequence. Do not include introductory text, explanations, or markdown code blocks.`;
        
        document.getElementById('promptOutput').value = prompt;
    };

    window.copyPrompt = function() {
        const promptArea = document.getElementById('promptOutput');
        promptArea.select();
        navigator.clipboard.writeText(promptArea.value).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = 'Copied';
            setTimeout(() => btn.innerText = 'Copy Prompt', 2000);
        });
    };

    window.generatePrompt();

    let audioCtx = null;
    let piano = null;
    let stopTimeout = null;
    let visualTimeouts = [];

    window.playMusic = async function() {
        const rawText = llmOutput.innerText;

        const regex = /\[T:(\d+(\.\d+)?)\]|\[D:([a-zA-Z]+)\]|\[Ped:(On|Off)\]|\||([A-Za-z0-9]+)\(|\)|([a-zA-Z0-9#b+]+):(\d+(\.\d+)?)/gi;
        
        let match;
        let events = [];
        let tempoMap = [{ beat: 0, bpm: 120 }];
        let currentVel = 75; 
        
        let currentMeasureBeat = 0;
        let activeVoice = 'default';
        let voiceOffsets = { 'default': 0 };

        function getCurrentBeat() { return currentMeasureBeat + (voiceOffsets[activeVoice] || 0); }
        function advanceTime(beats) { voiceOffsets[activeVoice] = (voiceOffsets[activeVoice] || 0) + beats; }

        while ((match = regex.exec(rawText)) !== null) {
            const token = match[0];
            
            if (match[1]) {
                tempoMap.push({ beat: getCurrentBeat(), bpm: parseFloat(match[1]) });
            } 
            else if (match[3]) {
                const dyn = match[3].toLowerCase();
                const vels = { pp:40, p:55, mp:70, mf:85, f:100, ff:115 };
                currentVel = vels[dyn] || 75;
            } 
            else if (match[4]) {
                events.push({ type: 'pedal', state: match[4].toLowerCase() === 'on', beat: getCurrentBeat() });
            } 
            else if (token === '|') {
                let maxOffset = 0;
                for (let v in voiceOffsets) { if (voiceOffsets[v] > maxOffset) maxOffset = voiceOffsets[v]; }
                currentMeasureBeat += maxOffset;
                voiceOffsets = {};
                activeVoice = 'default';
            } 
            else if (match[5]) {
                activeVoice = match[5].toUpperCase();
                if (voiceOffsets[activeVoice] === undefined) voiceOffsets[activeVoice] = 0;
            } 
            else if (token === ')') {
                activeVoice = 'default';
            } 
            else if (match[6] && match[7]) {
                const noteStr = match[6];
                const dur = parseFloat(match[7]);
                const isRest = noteStr.toUpperCase().startsWith('R');
                
                events.push({
                    type: isRest ? 'rest' : 'note',
                    notes: isRest ? [] : noteStr.split('+').map(n => n.charAt(0).toUpperCase() + n.slice(1).toLowerCase()),
                    beat: getCurrentBeat(),
                    durationBeats: dur,
                    velocity: Math.min(127, Math.max(0, currentVel + Math.floor(Math.random() * 10 - 5))),
                    matchIndex: match.index,
                    matchLength: token.length
                });
                advanceTime(dur);
            }
        }

        const noteEvents = events.filter(e => e.type === 'note' || e.type === 'rest');
        if (noteEvents.length === 0) {
            alert("No valid notes found.");
            return;
        }

        window.stopMusic();
        llmOutput.contentEditable = "false";

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        piano = new SplendidGrandPiano(audioCtx);
        piano.output.addEffect("reverb", new Reverb(audioCtx), 0.3);

        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');

        playBtn.disabled = true;
        playBtn.innerText = "Loading...";

        await piano.load;
        if (!audioCtx || audioCtx.state === 'closed') return;

        playBtn.innerText = "Playing...";
        playBtn.classList.add('btn-playing');
        stopBtn.disabled = false;

        tempoMap.sort((a, b) => a.beat - b.beat);
        events.sort((a, b) => a.beat - b.beat);

        function beatToSec(beat) {
            let sec = 0, currentBPM = tempoMap[0].bpm, lastBeat = 0;
            for (let i = 1; i < tempoMap.length; i++) {
                if (beat >= tempoMap[i].beat) {
                    sec += (tempoMap[i].beat - lastBeat) * (60 / currentBPM);
                    currentBPM = tempoMap[i].bpm;
                    lastBeat = tempoMap[i].beat;
                } else break;
            }
            sec += (beat - lastBeat) * (60 / currentBPM);
            return sec;
        }

        events.forEach(ev => {
            ev.sec = beatToSec(ev.beat);
            if (ev.type === 'note' || ev.type === 'rest') {
                ev.durationSecs = beatToSec(ev.beat + ev.durationBeats) - ev.sec;
            }
        });

        const pedalEvents = events.filter(e => e.type === 'pedal');
        events.forEach(ev => {
            if (ev.type === 'note') {
                let latestPedal = pedalEvents.slice().reverse().find(p => p.beat <= ev.beat);
                if (latestPedal && latestPedal.state === true) {
                    let nextOff = pedalEvents.find(p => p.beat > ev.beat && !p.state);
                    let offBeat = nextOff ? nextOff.beat : ev.beat + 4;
                    let offSec = beatToSec(offBeat);
                    let endSec = ev.sec + ev.durationSecs;
                    if (offSec > endSec) ev.durationSecs = offSec - ev.sec;
                }
            }
        });

        const visualGroups = {};
        noteEvents.forEach(ev => {
            const tStr = ev.sec.toFixed(3);
            if (!visualGroups[tStr]) visualGroups[tStr] = [];
            visualGroups[tStr].push({ start: ev.matchIndex, end: ev.matchIndex + ev.matchLength });
        });

        let currentEventIndex = 0;
        let visualGroupKeys = Object.keys(visualGroups).map(Number).sort((a,b) => a - b);
        let currentVisualIndex = 0;
        const startTime = audioCtx.currentTime + 0.1;

        function schedule() {
            if (!audioCtx || audioCtx.state === 'closed') return;
            const lookahead = 0.5;
            const now = audioCtx.currentTime - startTime;

            while (currentEventIndex < events.length && events[currentEventIndex].sec < now + lookahead) {
                const ev = events[currentEventIndex];
                if (ev.type === 'note') {
                    ev.notes.forEach(n => {
                        try {
                            piano.start({ note: n, time: startTime + ev.sec, duration: ev.durationSecs, velocity: ev.velocity });
                        } catch(err) {}
                    });
                }
                currentEventIndex++;
            }

            while (currentVisualIndex < visualGroupKeys.length && visualGroupKeys[currentVisualIndex] < now + lookahead) {
                const tSec = visualGroupKeys[currentVisualIndex];
                const spans = visualGroups[tSec.toFixed(3)];
                const delayMs = (startTime + tSec - audioCtx.currentTime) * 1000;
                
                spans.sort((a, b) => b.start - a.start);
                
                const id = setTimeout(() => {
                    if (!audioCtx || audioCtx.state === 'closed') return;
                    let html = rawText;
                    spans.forEach(span => {
                        html = html.substring(0, span.start) + 
                               `<span class="active-note">${html.substring(span.start, span.end)}</span>` + 
                               html.substring(span.end);
                    });
                    llmOutput.innerHTML = html;
                    const activeSpan = llmOutput.querySelector('.active-note');
                    if (activeSpan) activeSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, Math.max(0, delayMs));
                
                visualTimeouts.push(id);
                currentVisualIndex++;
            }

            if (currentEventIndex < events.length || currentVisualIndex < visualGroupKeys.length) {
                stopTimeout = setTimeout(schedule, 100);
            } else {
                const totalDurationSecs = events.length > 0 ? events[events.length - 1].sec + 2 : 2;
                stopTimeout = setTimeout(() => { window.stopMusic(); }, Math.max(0, (startTime + totalDurationSecs - audioCtx.currentTime) * 1000));
            }
        }
        schedule();
    };

    window.stopMusic = function() {
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        piano = null;
        
        if (stopTimeout) { clearTimeout(stopTimeout); stopTimeout = null; }
        visualTimeouts.forEach(id => clearTimeout(id));
        visualTimeouts = [];

        const playBtn = document.getElementById('playBtn');
        playBtn.disabled = false;
        playBtn.innerText = "Play";
        playBtn.classList.remove('btn-playing');
        document.getElementById('stopBtn').disabled = true;

        llmOutput.contentEditable = "true";
        llmOutput.innerText = llmOutput.innerText; 
        if (llmOutput.innerText.trim() === '') llmOutput.innerHTML = '';
    };
</script>

</body>
</html>
